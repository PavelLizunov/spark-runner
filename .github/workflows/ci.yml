name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate JSON evidence files
        run: |
          set -euo pipefail
          python3 -c "import json; json.load(open('PROGRESS.json'))"
          python3 -c "import json; json.load(open('docs/evidence/run.json'))"
          python3 -c "import json; json.load(open('protocol/0.142.0/stable.schema.json'))"
          python3 -c "import json; json.load(open('protocol/0.144.3/codex_app_server_protocol.v2.schemas.json'))"
          python3 - <<'PY'
          import hashlib
          import json

          with open("codex.lock", "r", encoding="utf-8") as handle:
              lock = json.load(handle)
          path = lock["schema_path"]
          actual = hashlib.sha256(open(path, "rb").read()).hexdigest()
          if actual != lock["schema_hash"]:
              raise SystemExit(f"{path}: SHA-256 does not match codex.lock")
          PY

      - name: Validate JSONL evidence timeline
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json

          with open("docs/evidence/events.jsonl", "r", encoding="utf-8") as handle:
              for line_number, line in enumerate(handle, start=1):
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      json.loads(line)
                  except json.JSONDecodeError as exc:
                      raise SystemExit(
                          f"docs/evidence/events.jsonl:{line_number}: invalid JSON: {exc}"
                      )
          PY

      - name: Rust checks
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-targets --all-features
